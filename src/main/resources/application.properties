spring.application.name=oauth
server.port=8081
logging.level.org.springframework=DEBUG
logging.level.org.springframework.boot=DEBUG
logging.level.org.apache.catalina=DEBUG
logging.level.org.springframework.web=DEBUG
spring.security.user.name:user
spring.security.user.password:12345
logging.level.springframework.security:TRACE
# MySQL database connection URL
spring.datasource.url=jdbc:mysql://localhost:3306/oauth
# Database credentials
spring.datasource.username=root
spring.datasource.password=root
# Driver class (optional; Spring Boot can often deduce this from the URL)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Hibernate/JPA settings
# 'update' automatically creates/updates tables based on your Java entities
spring.jpa.hibernate.ddl-auto=update
# Shows executed SQL queries in the console
spring.jpa.show-sql=true
# Hibernate dialect for MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
